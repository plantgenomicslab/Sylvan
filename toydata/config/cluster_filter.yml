  memory: 48g
fastp_PAIRED:
  ncpus: 16
  memory: 64g
STAR_paired:
  ncpus: 12
  memory: 48g
mergeSTAR:
  ncpus: 16
  memory: 64g
calculateRSEMExpression:
  ncpus: 16
  memory: 64g
prepRSEM:
  ncpus: 16
  memory: 64g
lncRNA_pred:
  ncpus: 24
  memory: 96g
STAR_index:
